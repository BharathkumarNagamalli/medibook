{% extends "base.html" %}
{% block title %}Profile – MediBook{% endblock %}
{% block content %}
<div class="page">
  <div class="container-sm" style="padding-top:1rem;">
    <h1 style="font-size:1.8rem;letter-spacing:-.4px;margin-bottom:.3rem;">Your Profile</h1>
    <p style="color:var(--muted);font-size:.92rem;margin-bottom:2rem;">Update your personal information.</p>
    <div class="card">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.75rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);">
        <div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--violet));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#020a0f;">
          {{ user.name[0].upper() }}
        </div>
        <div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;">{{ user.name }}</div>
          <div style="font-size:.84rem;color:var(--muted);">{{ user.email }}</div>
          <span class="badge badge-green" style="margin-top:.3rem;">✓ Verified</span>
        </div>
      </div>
      <form method="POST">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" value="{{ user.name }}" required>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" value="{{ user.age or '' }}" min="1" max="120">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" value="{{ user.phone or '' }}" placeholder="+91 ...">
          </div>
        </div>
        <div class="form-group">
          <label>Email (cannot change)</label>
          <input type="email" value="{{ user.email }}" disabled style="opacity:.5;cursor:not-allowed;">
        </div>
        <div style="padding-top:.5rem;border-top:1px solid var(--border);margin-top:.5rem;">
          <button type="submit" class="btn btn-primary" style="padding:.65rem 1.75rem;">Save Changes</button>
        </div>
      </form>
    </div>
    <div style="margin-top:1.5rem;text-align:center;">
      <a href="{{ url_for('dashboard') }}" style="color:var(--muted);font-size:.85rem;text-decoration:none;">← Back to Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
