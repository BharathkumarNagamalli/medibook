{% extends "base.html" %}
{% block title %}Login – MediBook{% endblock %}
{% block head %}
<style>
.auth-wrap{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;}
.auth-box{width:100%;max-width:440px;}
.auth-head{margin-bottom:1.8rem;}
.auth-head h1{font-size:1.9rem;letter-spacing:-.5px;margin-bottom:.3rem;}
.auth-head p{color:var(--muted);font-size:.92rem;}
.auth-foot{text-align:center;margin-top:1.25rem;font-size:.85rem;color:var(--muted);}
.auth-foot a{color:var(--accent);text-decoration:none;font-weight:600;}
.admin-hint{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:.7rem 1rem;margin-bottom:1.2rem;font-size:.82rem;color:#a78bfa;}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-head">
      <h1>Welcome back</h1>
      <p>Sign in to manage your appointments.</p>
    </div>
    <div class="admin-hint">
      🔑 <strong>Admin demo:</strong> admin@medibook.com / admin123
    </div>
    <div class="card">
      <form method="POST">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email" autofocus>
        </div>
        <div class="form-group" style="margin-bottom:.5rem;">
          <label>Password</label>
          <input type="password" name="password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-wide" style="margin-top:1rem;">Sign In →</button>
      </form>
    </div>
    <div class="auth-foot">No account? <a href="{{ url_for('register') }}">Register free</a></div>
  </div>
</div>
{% endblock %}
